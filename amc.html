<div id="report" class="report"></div></div><script>

function generate(){

let client=document.getElementById("client").value

let ext=document.getElementById("ext").value||0
let mod=document.getElementById("mod").value||0
let smoke=document.getElementById("smoke").value||0
let mcp=document.getElementById("mcp").value||0
let siren=document.getElementById("siren").value||0
let light=document.getElementById("light").value||0
let hose=document.getElementById("hose").value||0
let sprinkler=document.getElementById("sprinkler").value||0
let panel=document.getElementById("panel").value||0
let hpanel=document.getElementById("hpanel").value||0

function calc(q,r){return q*r*12}

let extC=calc(ext,20)
let modC=calc(mod,20)
let smokeC=calc(smoke,20)
let mcpC=calc(mcp,15)
let sirenC=calc(siren,15)
let lightC=calc(light,30)
let hoseC=calc(hose,15)
let sprinklerC=calc(sprinkler,15)
let panelC=calc(panel,100)
let hpanelC=calc(hpanel,100)

let subtotal=extC+modC+smokeC+mcpC+sirenC+lightC+hoseC+sprinklerC+panelC+hpanelC

let minimumNote=""

if(subtotal < 5000){

subtotal=5000

minimumNote="<br><br><b>Minimum AMC charge ₹5000 applicable</b>"

}

let gst=Math.round(subtotal*0.18)

let grandTotal=subtotal+gst

let monthly=Math.round(grandTotal/12)

let date=new Date().toLocaleDateString()

let html=""

html+="<div class='letter'>"

html+="<img src='https://i.ibb.co/hRscn593/file-00000000e4a471fa8e7aaff8a90f2e34.png' class='logo'>"

html+="<h2>MADAN SAFETY SHIELD</h2>"
html+="Fire Safety Equipment Supplier<br>"
html+="Mobile : 8015828265<br>"
html+="Email : madansafetyshield@gmail.com<br><hr>"

html+="Quotation No : MSS-"+Math.floor(Math.random()*1000)+"<br>"
html+="Date : "+date+"<br><br>"

html+="Client : "+client+"<br>"
html+="Company : "+company+"<br>"
html+="Mobile : "+mobile+"<br><br>"

html+="<table>"
html+="<tr><th>Equipment</th><th>Qty</th><th>Rate</th><th>Total</th></tr>"

html+="<tr><td>Fire Extinguisher</td><td>"+ext+"</td><td>20</td><td>"+extC+"</td></tr>"
html+="<tr><td>Modular Extinguisher</td><td>"+mod+"</td><td>20</td><td>"+modC+"</td></tr>"
html+="<tr><td>Smoke Detector</td><td>"+smoke+"</td><td>20</td><td>"+smokeC+"</td></tr>"
html+="<tr><td>MCP</td><td>"+mcp+"</td><td>15</td><td>"+mcpC+"</td></tr>"
html+="<tr><td>Siren</td><td>"+siren+"</td><td>15</td><td>"+sirenC+"</td></tr>"
html+="<tr><td>Emergency Light</td><td>"+light+"</td><td>30</td><td>"+lightC+"</td></tr>"
html+="<tr><td>Hose Reel Drum</td><td>"+hose+"</td><td>15</td><td>"+hoseC+"</td></tr>"
html+="<tr><td>Sprinkler</td><td>"+sprinkler+"</td><td>15</td><td>"+sprinklerC+"</td></tr>"
html+="<tr><td>Fire Alarm Panel</td><td>"+panel+"</td><td>100</td><td>"+panelC+"</td></tr>"
html+="<tr><td>Hydrant Panel</td><td>"+hpanel+"</td><td>100</td><td>"+hpanelC+"</td></tr>"
html+="</table>"

html+="<br>Sub Total : ₹"+subtotal
html+="<br>GST (18%) : ₹"+gst
html+="<br><b>Grand Total : ₹"+grandTotal+"</b>"
html+="<br><b>AMC Monthly : ₹"+monthly+"</b>"

html+=minimumNote

html+="<br><br><h3>AMC Benefits</h3>"
html+="✔ 2 months once site inspection<br>"
html+="✔ Inspection log register entry<br>"
html+="✔ 5 Fire Extinguishers free refilling<br>"
html+="✔ Free delivery"

html+="<br><br><h3>Bank Details</h3>"

html+="Bank : State Bank Of India<br>"
html+="Account No : 32542422203<br>"
html+="IFSC : SBIN0000935<br>"
html+="Branch : Tiruppur"

html+="<br><br>Authorized Signature<br>Madan Safety Shield"

html+="</div>"

let msg="AMC QUOTATION%0AClient:"+client+"%0ACompany:"+company+"%0AGrand Total:"+grandTotal

html+="<br><br><a class='whatsapp' href='https://wa.me/918015828265?text="+msg+"' target='_blank'>Send via WhatsApp</a>"

document.getElementById("report").innerHTML=html

}
